<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Square — Team Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--red:#D93B1A;--red-dark:#B02E10;--cream:#FAF5EC;--cream-dark:#EDE3D0;--gold:#E8A020;--white:#fff;--text:#1A0A00;--mid:#5C3A1E}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--red);min-height:100vh;color:var(--white)}
.header{padding:2.5rem 2rem 1.5rem;text-align:center}
.header .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:.5rem}
.header h1{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,7vw,4rem);font-weight:900;line-height:1;letter-spacing:-.02em}
.header h1 em{font-style:italic;color:var(--cream)}
.header p{font-size:13px;color:rgba(255,255,255,.5);margin-top:.6rem;font-weight:300}
.search-wrap{display:flex;justify-content:center;padding:.5rem 2rem 1.5rem}
.search-wrap input{width:100%;max-width:460px;padding:12px 20px;border-radius:50px;border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.search-wrap input::placeholder{color:rgba(255,255,255,.4)}
.search-wrap input:focus{border-color:var(--gold)}
.count{text-align:center;font-size:12px;color:rgba(255,255,255,.4);margin-bottom:1rem;letter-spacing:.04em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1rem;padding:0 1.5rem 3rem;max-width:1200px;margin:0 auto}
.card{background:var(--cream);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.card:hover{transform:translateY(-4px);box-shadow:0 14px 36px rgba(0,0,0,.35)}
.card-top{background:var(--red);padding:1.2rem 1.2rem .9rem;border-bottom:2px solid rgba(255,255,255,.08)}
.card-brand{font-family:'Playfair Display',serif;font-size:10px;font-weight:700;letter-spacing:.14em;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:.7rem}
.card-av{width:48px;height:48px;border-radius:50%;background:var(--cream);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:var(--red);margin-bottom:.6rem}
.card-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#fff;line-height:1.2}
.card-role{font-size:11px;color:var(--gold);font-weight:500;letter-spacing:.04em;margin-top:3px}
.card-body{padding:.9rem 1.2rem}
.ci{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mid);margin-bottom:5px;overflow:hidden}
.ci span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ci-icon{width:18px;height:18px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-btn{display:block;margin:0 1.2rem 1.2rem;padding:9px;border-radius:9px;border:1.5px solid var(--red);background:transparent;color:var(--red);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;transition:all .15s}
.card-btn:hover{background:var(--red);color:#fff}
.empty{grid-column:1/-1;text-align:center;padding:4rem;color:rgba(255,255,255,.4);font-size:14px}

/* QR Modal */
.qr-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;padding:1.5rem}
.qr-modal.open{display:flex}
.qr-box{background:var(--cream);border-radius:20px;padding:2rem;text-align:center;max-width:280px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:pop .18s ease}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.qr-box h3{font-family:'Playfair Display',serif;font-size:16px;color:var(--text);margin-bottom:.3rem}
.qr-box p{font-size:11px;color:var(--mid);margin-bottom:1rem}
.qr-inner{display:inline-block;background:#fff;padding:8px;border-radius:10px}
.qr-close{margin-top:1rem;padding:9px 24px;border-radius:9px;border:1.5px solid rgba(217,59,26,.3);background:transparent;color:var(--red);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.qr-close:hover{background:var(--red);color:#fff}
</style>
</head>

function initials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function profileUrl(p){return BASE+'/profiles/'+p.slug+'.html'}

function render(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const f=people.filter(p=>p.name.toLowerCase().includes(q)||p.role.toLowerCase().includes(q));
  document.getElementById('count').textContent=f.length+' of '+people.length+' team members';
  const g=document.getElementById('grid');
  if(!f.length){g.innerHTML='<div class="empty">No results found</div>';return;}
  g.innerHTML=f.map(p=>`
    <div class="card">
      <div class="card-top">
        <div class="card-brand">FOOD SQUARE</div>
        <div class="card-av">${initials(p.name)}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-role">${p.role}</div>
      </div>
      <div class="card-body">
        <div class="ci">
          <div class="ci-icon">${phoneIcon()}</div>
          <span>+91 ${p.phone}</span>
        </div>
        <div class="ci">
          <div class="ci-icon">${emailIcon()}</div>
          <span>${p.email}</span>
        </div>
      </div>
      <a class="card-btn" href="${profileUrl(p)}" target="_blank">View profile page</a>
      <div style="padding:0 1.2rem 1.2rem">
        <button class="card-btn" style="width:100%;margin:0" onclick="showQR('${p.slug}','${p.name}')">Show QR code</button>
      </div>
    </div>
  `).join('');
}

function phoneIcon(){return`<svg width="9" height="9" viewBox="0 0 10 10" fill="white"><path d="M2 1h2l1 2.5-1.2.8a5.5 5.5 0 0 0 2.9 2.9l.8-1.2L10 7v2a1 1 0 0 1-1 1C4 10 0 6 0 2a1 1 0 0 1 1-1z"/></svg>`}
function emailIcon(){return`<svg width="9" height="9" viewBox="0 0 10 10" fill="white"><rect x="1" y="2" width="8" height="6" rx="1"/><path d="M1 2l4 4 4-4" fill="none" stroke="#D93B1A" stroke-width=".8"/></svg>`}

let qrInst=null;
function showQR(slug,name){
  const p=people.find(x=>x.slug===slug);
  document.getElementById('qr-name').textContent=name;
  document.getElementById('qr-canvas').innerHTML='';
  if(qrInst){qrInst.clear();qrInst=null;}
  const url=profileUrl(p);
  qrInst=new QRCode(document.getElementById('qr-canvas'),{text:url,width:180,height:180,colorDark:'#D93B1A',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
  document.getElementById('qr-modal').classList.add('open');
}
function closeQR(){document.getElementById('qr-modal').classList.remove('open');}

render();
