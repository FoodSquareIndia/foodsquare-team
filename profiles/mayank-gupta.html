<style>
:root{--red:#D93B1A;--cream:#FAF5EC;--cream-dark:#EDE3D0;--gold:#E8A020;--text:#1A0A00;--mid:#6B4226}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--red);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:2rem 1rem 3rem}

.card{background:var(--cream);border-radius:24px;width:100%;max-width:400px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.35);animation:rise .4s cubic-bezier(.22,1,.36,1)}
@keyframes rise{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

.hero{background:var(--red);padding:2.5rem 2rem 2.8rem;text-align:center;position:relative}
.hero::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:28px;background:var(--cream);border-radius:28px 28px 0 0}

.logo-wrap{display:flex;justify-content:center;margin-bottom:1.6rem}
.logo-wrap img{width:120px;height:auto;display:block}

.hname{font-family:'Geist',sans-serif;font-size:clamp(1.4rem,5vw,1.9rem);font-weight:900;color:#fff;line-height:1.15;letter-spacing:-.02em}
.hrole{font-size:12px;color:#ffcf58;font-weight:500;letter-spacing:.07em;text-transform:uppercase;margin-top:6px}

.links{padding:1.8rem 1.5rem 1rem}

.save-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px 16px;border-radius:14px;background:var(--red);margin-bottom:14px;transition:all .18s;color:#fff;font-weight:600;font-size:14px;letter-spacing:.02em;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.save-btn:hover{background:#c0330f;box-shadow:0 6px 20px rgba(217,59,26,.35)}
.save-btn svg{width:18px;height:18px;flex-shrink:0}

.link-row{display:flex;align-items:center;gap:14px;text-decoration:none;padding:13px 16px;border-radius:14px;background:#fff;border:1px solid var(--cream-dark);margin-bottom:10px;transition:all .18s;color:var(--text)}
.link-row:hover{transform:translateX(4px);border-color:var(--red);box-shadow:0 4px 16px rgba(217,59,26,.12)}

.wa-btn{display:flex;align-items:center;justify-content:center;text-decoration:none;padding:13px 16px;border-radius:14px;background:#fff;border:1px solid var(--cream-dark);margin-bottom:10px;transition:all .18s}
.wa-btn:hover{border-color:#25D366;box-shadow:0 4px 16px rgba(37,211,102,.15)}
.wa-btn svg{width:32px;height:32px}

.licon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.licon svg{width:20px;height:20px}
.licon.phone{background:#E8F5E9}
.licon.email{background:#FFF3E0}
.licon.website{background:#E3F2FD}
.licon.linkedin{background:#E8F0FB}
.licon.instagram{background:#FDE8F0}

.ltext{flex:1;min-width:0}
.ltext .ltop{font-size:10px;color:var(--mid);font-weight:600;letter-spacing:.06em;text-transform:uppercase;opacity:.6}
.ltext .lval{font-size:13.5px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.larrow{color:var(--red);font-size:18px;opacity:.4}

.divider{height:1px;background:var(--cream-dark);margin:0 1.5rem}
.footer{padding:1.2rem 1.5rem 1.6rem;text-align:center}
.footer .ft{font-size:11px;color:var(--mid);opacity:.45;font-weight:300;letter-spacing:.03em}
.footer .ft strong{font-weight:700;opacity:1;font-family:'Geist',sans-serif}

.back{margin-bottom:1.5rem;text-align:center}
.back a{font-size:12px;color:rgba(255,255,255,.5);text-decoration:none;letter-spacing:.06em;transition:color .15s}
.back a:hover{color:rgba(255,255,255,.9)}
.social-row{display:flex;align-items:center;justify-content:center;gap:12px;padding:6px 0 4px}
.social-icon{width:48px;height:48px;border-radius:14px;background:#fff;border:1px solid var(--cream-dark);display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all .18s;flex-shrink:0}
.social-icon:hover{border-color:var(--red);box-shadow:0 4px 16px rgba(217,59,26,.12);transform:translateY(-2px)}
</style>
</head>
